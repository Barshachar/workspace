name: Flutter Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  flutter-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Fetch dependencies
        working-directory: b2b_app
        run: flutter pub get

      - name: Flutter analyze
        working-directory: b2b_app
        run: flutter analyze

      - name: Flutter tests
        working-directory: b2b_app
        run: flutter test --reporter expanded
