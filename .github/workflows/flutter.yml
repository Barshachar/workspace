name: Flutter CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
      - uses: actions/cache@v3
        with:
          path: |
            ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml') }}
      - uses: actions/cache@v3
        with:
          path: admin/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('admin/package-lock.json') }}
      - uses: actions/cache@v3
        with:
          path: supabase/functions/node_modules
          key: ${{ runner.os }}-npm-fn-${{ hashFiles('supabase/functions/package.json') }}
      - uses: actions/cache@v3
        with:
          path: .dart_tool/build
          key: ${{ runner.os }}-build-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-build-
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter analyze
      - run: flutter test --coverage
      - run: |
          genhtml coverage/lcov.info -o coverage/html
          covered=$(grep -m1 -Po 'lines......: \K\d+(?=%)' coverage/html/index.html)
          if [ "$covered" -lt 90 ]; then
            echo "Coverage $covered% is below 90%" && exit 1; fi
      - run: flutter build web --release
      - run: echo "deploy migrations & functions"
