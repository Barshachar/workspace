name: Quality Gate

on:
  pull_request:
  push:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: cd b2b_app && flutter pub get
      - run: cd b2b_app && flutter analyze
      - run: cd b2b_app && flutter test --reporter expanded
